name: bannaa_app
description: تطبيق بنّاء - حاسبة كميات الخرسانة وتقدير أسعار البناء مع الإسقاط الجوي
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # واجهة المستخدم
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # إدارة الحالة
  provider: ^6.1.1

  # قاعدة البيانات المحلية (للـ Offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # تصدير PDF
  pdf: ^3.10.7
  printing: ^5.12.0

  # أيقونات وأدوات
  cupertino_icons: ^1.0.2
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  intl: ^0.20.2

  # ══ Firebase ════════════════════════════════════════════
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.3.1

  # ══ ميزة الإسقاط الجوي ══════════════════════════════════
  google_maps_flutter: ^2.9.0       # خرائط Google التفاعلية
  geolocator: ^13.0.1               # تحديد الموقع الجغرافي
  geocoding: ^3.0.0                 # تحويل العنوان ↔ إحداثيات

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true
