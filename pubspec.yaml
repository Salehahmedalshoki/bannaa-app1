name: bannaa_app
description: تطبيق بنّاء - حاسبة كميات الخرسانة وتقدير أسعار البناء
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # واجهة المستخدم
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # إدارة الحالة
  provider: ^6.1.1

  # قاعدة البيانات المحلية
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # تصدير PDF
  pdf: ^3.10.7
  printing: ^5.12.0

  # أيقونات وأدوات
  cupertino_icons: ^1.0.2
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  intl: ^0.19.0

  # ══ Firebase (فعّله بعد إضافة google-services.json) ══════
  # firebase_core: ^2.27.0
  # firebase_auth: ^4.17.0
  # google_sign_in: ^6.2.1
  # cloud_firestore: ^4.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
